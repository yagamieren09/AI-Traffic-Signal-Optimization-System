<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic AI — Control Room</title>
  
  <script src="libs/react.min.js"></script>
  <script src="libs/react-dom.min.js"></script>
  <script>
    // PropTypes shim — Recharts UMD bundle requires window.PropTypes
    (function() {
      var shim = function() { return null; };
      shim.isRequired = shim;
      var propTypes = function() { return shim; };
      propTypes.array = shim; propTypes.bool = shim; propTypes.func = shim;
      propTypes.number = shim; propTypes.object = shim; propTypes.string = shim;
      propTypes.symbol = shim; propTypes.any = shim; propTypes.node = shim;
      propTypes.element = shim; propTypes.elementType = shim;
      propTypes.instanceOf = propTypes; propTypes.oneOf = propTypes;
      propTypes.oneOfType = propTypes; propTypes.arrayOf = propTypes;
      propTypes.objectOf = propTypes; propTypes.shape = propTypes;
      propTypes.exact = propTypes; propTypes.checkPropTypes = function() {};
      propTypes.resetWarningCache = function() {};
      propTypes.PropTypes = propTypes;
      window.PropTypes = propTypes;
    })();
  </script>
  <script src="libs/recharts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --bg2:       #0d1117;
      --bg3:       #111820;
      --panel:     #141c26;
      --border:    #1e2d40;
      --accent:    #00d4ff;
      --accent2:   #ff6b35;
      --accent3:   #39ff14;
      --amber:     #ffb800;
      --red:       #ff2d55;
      --text:      #c8d6e5;
      --text-dim:  #4a6278;
      --text-hi:   #ffffff;
      --mono:      Consolas, 'Courier New', monospace;
      --sans:      Segoe UI, Arial, sans-serif;
      --cond:      Segoe UI, Arial, sans-serif;
      --glow-b:    0 0 12px rgba(0,212,255,0.4), 0 0 40px rgba(0,212,255,0.1);
      --glow-g:    0 0 12px rgba(57,255,20,0.4);
      --glow-o:    0 0 12px rgba(255,107,53,0.4);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }
    body { background-image: radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.03) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.03) 0%, transparent 60%); }

    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 60px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 1.4rem; }
    .logo-text { font-family: var(--cond); font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: var(--text-hi); text-transform: uppercase; }
    .logo-sub  { font-family: var(--mono); font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; }
    .header-status { display: flex; align-items: center; gap: 20px; }
    .status-pill {
      font-family: var(--mono); font-size: 0.65rem; letter-spacing: 1px;
      padding: 4px 12px; border-radius: 2px; text-transform: uppercase;
      border: 1px solid; display: flex; align-items: center; gap: 6px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.2 } }

    /* ── Layout ── */
    .app-body { display: grid; grid-template-columns: 260px 1fr; flex: 1; min-height: 0; }
    .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
    .main { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }

    /* ── Sidebar sections ── */
    .sidebar-section { display: flex; flex-direction: column; gap: 0.75rem; }
    .sidebar-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

    /* ── Buttons ── */
    .btn {
      font-family: var(--cond); font-weight: 700; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
      padding: 10px 16px; border: 1px solid; cursor: pointer; border-radius: 2px;
      transition: all 0.15s; background: transparent; width: 100%;
    }
    .btn-primary   { color: var(--accent);  border-color: var(--accent);  }
    .btn-primary:hover  { background: rgba(0,212,255,0.1); box-shadow: var(--glow-b); }
    .btn-danger    { color: var(--red);    border-color: var(--red);    }
    .btn-danger:hover   { background: rgba(255,45,85,0.1); }
    .btn-success   { color: var(--accent3); border-color: var(--accent3); }
    .btn-success:hover  { background: rgba(57,255,20,0.1); box-shadow: var(--glow-g); }
    .btn-amber     { color: var(--amber);   border-color: var(--amber); }
    .btn-amber:hover    { background: rgba(255,184,0,0.1); }
    .btn:disabled  { opacity: 0.3; cursor: not-allowed; }

    /* ── Toggle mode ── */
    .mode-toggle { display: flex; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
    .mode-btn {
      flex: 1; padding: 8px 4px; font-family: var(--mono); font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase;
      border: none; cursor: pointer; background: transparent; color: var(--text-dim); transition: all 0.2s;
    }
    .mode-btn.active-rl  { background: rgba(0,212,255,0.15); color: var(--accent); }
    .mode-btn.active-fx  { background: rgba(255,184,0,0.15); color: var(--amber); }

    /* ── Slider ── */
    .slider-wrap { display: flex; flex-direction: column; gap: 6px; }
    .slider-label { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); display: flex; justify-content: space-between; }
    .slider-val { color: var(--accent2); }
    input[type=range] { width: 100%; accent-color: var(--accent); }

    /* ── Stat cards ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .stat-card {
      background: var(--panel); border: 1px solid var(--border); padding: 1.2rem;
      position: relative; overflow: hidden;
    }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
    .stat-card.blue::before  { background: var(--accent);  box-shadow: var(--glow-b); }
    .stat-card.green::before { background: var(--accent3); box-shadow: var(--glow-g); }
    .stat-card.orange::before{ background: var(--accent2); box-shadow: var(--glow-o); }
    .stat-card.amber::before { background: var(--amber); }
    .stat-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-family: var(--cond); font-size: 2.2rem; font-weight: 900; line-height: 1; }
    .stat-card.blue   .stat-value { color: var(--accent); }
    .stat-card.green  .stat-value { color: var(--accent3); }
    .stat-card.orange .stat-value { color: var(--accent2); }
    .stat-card.amber  .stat-value { color: var(--amber); }
    .stat-unit { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); margin-top: 4px; }
    .stat-delta { font-family: var(--mono); font-size: 0.65rem; margin-top: 6px; }
    .delta-pos { color: var(--accent3); }
    .delta-neg { color: var(--red); }

    /* ── Grid of intersections ── */
    .intersections-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .intersection-card {
      background: var(--panel); border: 1px solid var(--border); padding: 1.2rem;
      position: relative;
    }
    .int-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .int-title { font-family: var(--cond); font-size: 0.9rem; font-weight: 700; letter-spacing: 2px; color: var(--text-hi); text-transform: uppercase; }
    .phase-badge {
      font-family: var(--mono); font-size: 0.6rem; letter-spacing: 1px; padding: 3px 10px;
      border-radius: 1px; text-transform: uppercase; border: 1px solid;
    }
    .phase-ns  { color: var(--accent3); border-color: var(--accent3); background: rgba(57,255,20,0.08); box-shadow: var(--glow-g); }
    .phase-ew  { color: var(--accent);  border-color: var(--accent);  background: rgba(0,212,255,0.08); box-shadow: var(--glow-b); }
    .phase-lock{ color: var(--amber);   border-color: var(--amber);   background: rgba(255,184,0,0.08); }

    /* ── Direction bars ── */
    .directions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .dir-row { display: flex; flex-direction: column; gap: 4px; }
    .dir-label { font-family: var(--mono); font-size: 0.55rem; color: var(--text-dim); display: flex; justify-content: space-between; }
    .dir-count { color: var(--text); }
    .bar-track { height: 6px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 1px; transition: width 0.4s ease; }
    .bar-ns  { background: var(--accent3); }
    .bar-ew  { background: var(--accent); }
    .bar-ns.high { background: var(--amber); }
    .bar-ew.high { background: var(--accent2); }
    .bar-fill.critical { background: var(--red) !important; animation: pulse-bar 0.6s infinite alternate; }
    @keyframes pulse-bar { from { opacity: 0.7 } to { opacity: 1 } }

    /* ── Charts row ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .chart-card { background: var(--panel); border: 1px solid var(--border); padding: 1.2rem; }
    .chart-title { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 1rem; }

    /* ── Training panel ── */
    .training-card { background: var(--panel); border: 1px solid var(--border); padding: 1.5rem; }
    .training-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
    .training-title { font-family: var(--cond); font-size: 1rem; font-weight: 700; letter-spacing: 2px; color: var(--text-hi); text-transform: uppercase; }
    .progress-wrap { margin-bottom: 1rem; }
    .progress-bar-track { height: 8px; background: var(--bg3); border-radius: 1px; overflow: hidden; margin-top: 8px; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); transition: width 0.5s ease; border-radius: 1px; }

    /* ── Log terminal ── */
    .log-terminal {
      background: var(--bg); border: 1px solid var(--border); padding: 1rem;
      font-family: var(--mono); font-size: 0.65rem; height: 160px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 3px;
    }
    .log-line { color: var(--text-dim); }
    .log-line span { color: var(--accent); }
    .log-line .ok { color: var(--accent3); }
    .log-line .warn { color: var(--amber); }

    /* ── Intersection signal visual ── */
    .signal-light { display: flex; gap: 6px; align-items: center; }
    .light-dot { width: 10px; height: 10px; border-radius: 50%; transition: all 0.3s; }
    .light-dot.on-ns  { background: var(--accent3); box-shadow: var(--glow-g); }
    .light-dot.on-ew  { background: var(--accent);  box-shadow: var(--glow-b); }
    .light-dot.off    { background: var(--bg3); box-shadow: none; }

    /* ── Section headers ── */
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0; }
    .section-title { font-family: var(--cond); font-size: 0.75rem; font-weight: 700; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Idle/error state ── */
    .idle-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; opacity: 0.4; }
    .idle-icon { font-size: 2.5rem; }
    .idle-text { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 2px; color: var(--text-dim); }

    /* ── Recharts overrides ── */
    .recharts-cartesian-axis-tick text { font-family: var(--mono) !important; font-size: 10px !important; fill: var(--text-dim) !important; }
    .recharts-tooltip-wrapper { font-family: var(--mono) !important; }
    .custom-tooltip { background: var(--panel); border: 1px solid var(--border); padding: 8px 12px; font-family: var(--mono); font-size: 0.65rem; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    .scanline {
      pointer-events: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
</html>
